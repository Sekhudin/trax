name: "Trax: Quality Assurance"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa-suite:
    name: Build & Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify Module Dependencies
        run: go mod verify

      - name: Run Linter Check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Format issues detected. Please run 'go fmt ./...'"
            exit 1
          fi

      - name: Execute Makefile Targets
        run: make all

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trax-dev-binary
          path: bin/trax
